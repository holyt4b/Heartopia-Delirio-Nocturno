<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>La Sociedad del Delirio Nocturno - Heartopia Guía de Precios</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
<style>
  :root{--bg-deep:#0d0d1a;--bg-card:rgba(139,92,246,0.06);--bg-card2:rgba(45,36,85,0.4);--bg-input:#1a1535;--gold:#e0c060;--gold-light:#f0d878;--green:#a8c870;--green-dim:#9088b0;--green-bg:rgba(120,160,60,0.15);--blue:#7ab8d4;--blue-bg:rgba(100,160,210,0.15);--orange:#d4a05a;--orange-bg:rgba(210,160,90,0.15);--purple:#8B5CF6;--purple-dim:#6B3FA0;--text:#e8e4f0;--text-dim:#9088b0;--text-muted:#4a4566;--text-detail:#c8b8e0;--star1:#e0c060;--star2:#9eb8c7;--star3:#e8a946;--star4:#c26bdb;--star5:#e85a5a;--border:rgba(139,92,246,0.12);--border-hover:rgba(139,92,246,0.3);--shadow-card:rgba(139,92,246,0.15);--tip-bg:rgba(139,92,246,0.1);--tip-color:#c8b8f0;--radius:14px;--body-bg:linear-gradient(160deg,#0d0d1a 0%,#1a1535 25%,#2d2455 50%,#1a1535 75%,#0d0d1a 100%);--body-glow1:rgba(139,92,246,0.08);--body-glow2:rgba(107,63,160,0.06);--emoji-bg:rgba(139,92,246,0.1);--logo-shadow:rgba(139,92,246,0.4);--h1-grad:linear-gradient(135deg,#c8b8f0 0%,#f0d878 40%,#8B5CF6 70%,#c26bdb 100%);--sub-grad:linear-gradient(90deg,#8B5CF6,#c26bdb,#f0d878);--filter-bg:rgba(139,92,246,0.06);--filter-border:rgba(139,92,246,0.15);--filter-active-bg:rgba(139,92,246,0.25);--filter-active-border:rgba(139,92,246,0.5);--filter-active-color:#c8b8f0;}

  [data-theme="light"]{--bg-deep:#f0ecf8;--bg-card:rgba(139,92,246,0.05);--bg-card2:rgba(230,222,250,0.6);--bg-input:#f5f2fa;--gold:#b8940a;--gold-light:#8a6d00;--green:#4a8c20;--green-dim:#7068a0;--green-bg:rgba(80,140,30,0.1);--blue:#2080b0;--blue-bg:rgba(40,120,190,0.1);--orange:#b07818;--orange-bg:rgba(180,120,30,0.1);--purple:#7C3AED;--purple-dim:#5B21B6;--text:#1a1530;--text-dim:#6860a0;--text-muted:#a098c0;--text-detail:#4a4070;--star1:#b08a10;--star2:#5090a8;--star3:#c08020;--star4:#9040b8;--star5:#c04040;--border:rgba(139,92,246,0.15);--border-hover:rgba(139,92,246,0.35);--shadow-card:rgba(139,92,246,0.1);--tip-bg:rgba(139,92,246,0.08);--tip-color:#5B21B6;--body-bg:linear-gradient(160deg,#f5f2fa 0%,#ece6f8 25%,#e0d8f0 50%,#ece6f8 75%,#f5f2fa 100%);--body-glow1:rgba(139,92,246,0.04);--body-glow2:rgba(107,63,160,0.03);--emoji-bg:rgba(139,92,246,0.08);--logo-shadow:rgba(139,92,246,0.2);--h1-grad:linear-gradient(135deg,#5B21B6 0%,#8a6d00 40%,#7C3AED 70%,#9040b8 100%);--sub-grad:linear-gradient(90deg,#7C3AED,#9040b8,#b08a10);--filter-bg:rgba(139,92,246,0.04);--filter-border:rgba(139,92,246,0.12);--filter-active-bg:rgba(139,92,246,0.15);--filter-active-border:rgba(139,92,246,0.4);--filter-active-color:#5B21B6;}

  .theme-toggle{position:fixed;top:14px;right:14px;z-index:50;background:var(--bg-input);border:1px solid var(--border);border-radius:50px;padding:7px 14px;cursor:pointer;font-size:18px;transition:all 0.3s;box-shadow:0 2px 12px var(--shadow-card);}
  .theme-toggle:hover{border-color:var(--border-hover);transform:scale(1.1);}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{min-height:100vh;background:var(--body-bg);font-family:'DM Sans',sans-serif;color:var(--text);overflow-x:hidden;transition:background 0.4s,color 0.4s;}
  body::before{content:'';position:fixed;top:0;left:0;right:0;bottom:0;background:radial-gradient(ellipse at 25% 15%,var(--body-glow1) 0%,transparent 50%),radial-gradient(ellipse at 75% 80%,var(--body-glow2) 0%,transparent 50%);pointer-events:none;z-index:0;}
  .container{position:relative;z-index:1;max-width:1020px;margin:0 auto;padding:24px 16px 80px;}
  .header{text-align:center;margin-bottom:24px;}
  .header .logo{width:140px;height:auto;border-radius:18px;margin-bottom:10px;box-shadow:0 4px 30px var(--logo-shadow),0 0 60px rgba(107,63,160,0.15);transition:box-shadow 0.4s;}
  .header .tag{font-size:11px;letter-spacing:5px;color:var(--text-dim);text-transform:uppercase;margin-bottom:8px;}
  .header h1{font-family:'Playfair Display',serif;font-size:40px;font-weight:800;background:var(--h1-grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:4px;}
  .header .sub{font-family:'Playfair Display',serif;font-size:18px;background:var(--sub-grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:6px;font-weight:700;}
  .header p{color:var(--text-dim);font-size:13px;max-width:520px;margin:0 auto;line-height:1.5;}
  .tabs{display:flex;justify-content:center;gap:6px;margin-bottom:18px;flex-wrap:wrap;}
  .tab-btn{padding:9px 18px;border-radius:12px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;transition:all 0.25s;border:1px solid rgba(139,92,246,0.15);background:rgba(139,92,246,0.06);color:var(--text-dim);}
  .tab-btn:hover{background:rgba(139,92,246,0.15);color:var(--text);}
  .tab-btn.active-garden{background:rgba(120,160,60,0.18);border-color:rgba(120,160,60,0.4);color:var(--green);}
  .tab-btn.active-fish{background:rgba(100,160,210,0.18);border-color:rgba(100,160,210,0.4);color:var(--blue);}
  .tab-btn.active-cook{background:rgba(210,160,90,0.18);border-color:rgba(210,160,90,0.4);color:var(--orange);}
  .tab-btn.active-bug{background:rgba(180,120,200,0.18);border-color:rgba(180,120,200,0.4);color:#c8a0e0;}
  .tab-btn.active-bird{background:rgba(100,180,160,0.18);border-color:rgba(100,180,160,0.4);color:#80d4b8;}
  .tab-btn.active-map{background:rgba(80,140,220,0.18);border-color:rgba(80,140,220,0.4);color:#70b8f0;}
  .tab-btn.active-calc{background:rgba(224,192,96,0.18);border-color:rgba(224,192,96,0.4);color:var(--gold-light);}
  .filters{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:18px;}
  .filters input[type="text"]{background:var(--bg-input);border:1px solid var(--filter-border);border-radius:10px;padding:7px 12px;color:var(--text);font-family:inherit;font-size:13px;outline:none;width:140px;transition:all 0.3s;}
  .filters input::placeholder{color:var(--text-muted);}
  .f-btn{background:var(--filter-bg);border:1px solid var(--filter-border);border-radius:10px;padding:6px 14px;color:var(--text-dim);font-family:inherit;font-size:12px;cursor:pointer;transition:all 0.2s;}
  .f-btn:hover{background:rgba(139,92,246,0.12);}
  .f-btn.on{background:var(--filter-active-bg);border-color:var(--filter-active-border);color:var(--filter-active-color);font-weight:600;}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:12px;}
  .card{background:linear-gradient(135deg,var(--bg-card) 0%,var(--bg-card2) 100%);border:1px solid var(--border);border-radius:var(--radius);padding:16px;transition:all 0.3s;}
  .card:hover{border-color:var(--border-hover);transform:translateY(-2px);box-shadow:0 8px 30px var(--shadow-card);}
  .card-head{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
  .card-emoji{font-size:30px;width:48px;height:48px;display:flex;align-items:center;justify-content:center;background:var(--emoji-bg);border-radius:12px;flex-shrink:0;}
  .card-info{flex:1;min-width:0;}
  .card-name{font-size:15px;font-weight:700;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .card-tags{display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
  .tag-lvl{font-size:10px;padding:2px 7px;border-radius:5px;font-weight:600;}
  .tag-garden{background:var(--green-bg);color:var(--green);}
  .tag-fish{background:var(--blue-bg);color:var(--blue);}
  .tag-cook{background:var(--orange-bg);color:var(--orange);}
  .tag-bug{background:rgba(180,120,200,0.15);color:#c8a0e0;}
  .tag-bird{background:rgba(100,180,160,0.15);color:#80d4b8;}
  .tag-sub{color:var(--text-dim);font-size:11px;}
  .card-price{text-align:right;}
  .card-price-label{font-size:10px;color:var(--text-dim);}
  .card-price-val{font-size:14px;font-weight:700;color:#e8a946;}
  .stars{display:grid;gap:5px;margin-bottom:10px;}
  .stars-4{grid-template-columns:repeat(4,1fr);}
  .stars-5{grid-template-columns:repeat(5,1fr);}
  .star-cell{text-align:center;padding:6px 2px;border-radius:8px;}
  .star-cell .sl{font-size:9px;font-weight:600;margin-bottom:2px;}
  .star-cell .sv{font-size:13px;font-weight:700;color:var(--text);}
  .star-cell .sv.empty{color:var(--text-muted);}
  .profit{display:flex;justify-content:space-between;align-items:center;padding:5px 9px;background:var(--tip-bg);border-radius:7px;font-size:11px;}
  .profit .l{color:var(--text-dim);}.profit .v{font-weight:700;}
  .profit .high{color:var(--green);}.profit .mid{color:var(--gold);}.profit .neg{color:#c85a5a;}
  .detail{font-size:11px;color:var(--text-dim);margin-top:8px;line-height:1.6;}
  .detail span{color:var(--text-detail);}
  .tip-box{margin-top:6px;background:var(--tip-bg);padding:6px 10px;border-radius:7px;color:var(--tip-color);font-style:italic;font-size:11px;border-left:2px solid var(--border-hover);}
  .footer{text-align:center;margin-top:28px;font-size:10px;color:var(--text-muted);}
  /* Calculator */
  .calc-panel{max-width:600px;margin:0 auto;}
  .calc-section{background:linear-gradient(135deg,var(--bg-card) 0%,var(--bg-card2) 100%);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:14px;}
  .calc-section h3{font-size:15px;font-weight:700;color:var(--gold-light);margin-bottom:14px;}
  .calc-row{display:flex;gap:10px;align-items:center;margin-bottom:10px;flex-wrap:wrap;}
  .calc-row label{font-size:12px;color:var(--text-dim);min-width:90px;}
  .calc-row select,.calc-row input[type="number"]{background:var(--bg-input);border:1px solid var(--border);border-radius:8px;padding:8px 10px;color:var(--text);font-family:inherit;font-size:13px;outline:none;flex:1;min-width:80px;transition:all 0.3s;}
  .calc-row select option{background:var(--bg-input);color:var(--text);}
  .calc-row select:focus,.calc-row input:focus{border-color:var(--border-hover);box-shadow:0 0 8px var(--shadow-card);}
  .calc-result{background:linear-gradient(135deg,var(--bg-card) 0%,var(--bg-card2) 100%);border:1px solid var(--border);border-radius:var(--radius);padding:20px;text-align:center;}
  .calc-result .big{font-size:36px;font-weight:800;color:var(--gold-light);margin:8px 0;}
  .calc-result .sub-val{font-size:14px;color:var(--green);margin:4px 0;}
  .calc-result .dim{font-size:12px;color:var(--text-dim);}
  .calc-breakdown{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px;}
  .calc-box{background:var(--tip-bg);border-radius:10px;padding:12px;text-align:center;}
  .calc-box .val{font-size:20px;font-weight:700;margin:4px 0;}
  .calc-box .lbl{font-size:11px;color:var(--text-dim);}
  /* Map */
  .map-panel{max-width:900px;margin:0 auto;}
  .map-frame{width:100%;height:70vh;min-height:450px;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:14px;position:relative;}
  .map-frame iframe{width:100%;height:100%;border:none;}
  .map-fullscreen{position:absolute;top:10px;right:10px;background:var(--bg-input);border:1px solid var(--border);border-radius:8px;padding:6px 12px;color:var(--text);font-family:inherit;font-size:12px;cursor:pointer;z-index:10;transition:all 0.2s;}
  .map-fullscreen:hover{border-color:var(--border-hover);background:var(--tip-bg);}
  .map-links{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px;margin-bottom:14px;}
  .map-link{background:linear-gradient(135deg,var(--bg-card) 0%,var(--bg-card2) 100%);border:1px solid var(--border);border-radius:var(--radius);padding:14px;text-decoration:none;color:var(--text);transition:all 0.25s;display:block;}
  .map-link:hover{border-color:var(--border-hover);transform:translateY(-2px);box-shadow:0 6px 20px var(--shadow-card);}
  .map-link .ml-title{font-size:14px;font-weight:700;margin-bottom:4px;}
  .map-link .ml-desc{font-size:11px;color:var(--text-dim);line-height:1.4;}
  .map-zones{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px;}
  .zone-card{background:linear-gradient(135deg,var(--bg-card) 0%,var(--bg-card2) 100%);border:1px solid var(--border);border-radius:var(--radius);padding:14px;}
  .zone-card h4{font-size:14px;font-weight:700;margin-bottom:8px;}
  .zone-card .zone-items{font-size:11px;color:var(--text-dim);line-height:1.7;}
  .zone-card .zone-items span{color:var(--text-detail);}
  @media(max-width:640px){.header h1{font-size:30px;}.grid{grid-template-columns:1fr;}.calc-breakdown{grid-template-columns:1fr;}.map-frame{height:60vh;min-height:350px;}}
</style>
</head>

function setTab(t,el){
  tab=t;
  document.querySelectorAll('.tab-btn').forEach(b=>b.className='tab-btn');
  const cls=t==='garden'?'active-garden':t==='fish'?'active-fish':t==='bug'?'active-bug':t==='bird'?'active-bird':t==='calc'?'active-calc':t==='map'?'active-map':'active-cook';
  el.classList.add('tab-btn',cls);
  document.getElementById('filtersBar').style.display=(t==='calc'||t==='map')?'none':'flex';
  document.getElementById('grid').style.display=(t==='calc'||t==='map')?'none':'grid';
  document.getElementById('calcView').style.display=t==='calc'?'block':'none';
  document.getElementById('mapView').style.display=t==='map'?'block':'none';
  if(t==='calc') renderCalc(); else if(t==='map') renderMap(); else render();
}
function setFilter(el){
  document.querySelectorAll('.f-btn').forEach(b=>b.classList.remove('on'));
  el.classList.add('on');filter=el.dataset.f;render();
}
function getStarCount(){return tab==='garden'?4:5;}

function render(){
  const data=getData(),search=document.getElementById('searchBox').value.toLowerCase();
  const list=data.filter(c=>c.name.toLowerCase().includes(search)).filter(c=>{
    if(filter==='low')return c.level<=3;if(filter==='mid')return c.level>=4&&c.level<=7;if(filter==='high')return c.level>=8;return true;
  }).sort((a,b)=>a.level-b.level);
  const grid=document.getElementById('grid');grid.innerHTML='';
  const stars=getStarCount(),labels=stars===4?SL4:SL5;
  const tagClass=tab==='garden'?'tag-garden':tab==='fish'?'tag-fish':tab==='bug'?'tag-bug':tab==='bird'?'tag-bird':'tag-cook';
  list.forEach(item=>{
    const card=document.createElement('div');card.className='card';
    let pH='';
    for(let i=0;i<stars;i++){const v=item.sell[i],sI=Math.min(i,SC.length-1),bg=v?'12':'05',bd=v?'25':'08';
      pH+=`<div class="star-cell" style="background:${SC[sI].replace(')','')+ bg});border:1px solid ${SC[sI].replace(')','')+ bd})"><div class="sl" style="color:${SC[sI]}">${labels[i]}</div><div class="sv ${v?'':'empty'}">${v?v+'g':'—'}</div></div>`;}
    const profit=item.sell[0]&&item.cost!==undefined?item.sell[0]-item.cost:null;
    const pC=profit>100?'high':profit>0?'mid':profit!==null?'neg':'';
    const costHTML=(tab==='fish'||tab==='bug'||tab==='bird')?'':`<div class="card-price"><div class="card-price-label">${tab==='garden'?'Semilla':'Coste'}</div><div class="card-price-val">${item.cost}g</div></div>`;
    const timeStr=item.time?`<span class="tag-sub">⏱${item.time}</span>`:'';
    card.innerHTML=`<div class="card-head"><div class="card-emoji">${item.emoji}</div><div class="card-info"><div class="card-name">${item.name}</div><div class="card-tags"><span class="tag-lvl ${tagClass}">Nv.${item.level}</span>${timeStr}</div></div>${costHTML}</div><div class="stars stars-${stars}">${pH}</div>${profit!==null?`<div class="profit"><span class="l">Beneficio 1★</span><span class="v ${pC}">${profit>=0?'+':''}${profit}g</span></div>`:''}<div class="detail">📋 <span>${item.detail}</span></div>${item.tip?`<div class="tip-box">💡 ${item.tip}</div>`:''}`;
    grid.appendChild(card);
  });
}

// ==================== CALCULATOR ====================
function renderCalc(){
  const all=getAllItems().filter(i=>i.sell&&i.sell[0]);
  const cv=document.getElementById('calcView');
  cv.innerHTML=`<div class="calc-panel">
    <div class="calc-section">
      <h3>🧮 Calculadora de Beneficios</h3>
      <div class="calc-row"><label>Categoría</label><select id="cCat" onchange="updateItemList()"><option value="all">Todas</option><option value="garden">🌾 Cultivos</option><option value="fish">🐟 Peces</option><option value="cook">🍳 Recetas</option><option value="bug">🦋 Bichos</option><option value="bird">🐦 Aves</option></select></div>
      <div class="calc-row"><label>Item</label><select id="cItem" onchange="calcUpdate()"></select></div>
      <div class="calc-row"><label>Calidad ★</label><select id="cStar" onchange="calcUpdate()"><option value="0">1★</option><option value="1">2★</option><option value="2">3★</option><option value="3">4★</option><option value="4">5★</option></select></div>
      <div class="calc-row"><label>Cantidad</label><input id="cQty" type="number" min="1" value="1" onchange="calcUpdate()" oninput="calcUpdate()"></div>
      <div class="calc-row"><label>Coste extra</label><input id="cCostExtra" type="number" min="0" value="0" placeholder="Ingredientes comprados..." onchange="calcUpdate()" oninput="calcUpdate()"></div>
    </div>
    <div class="calc-result" id="calcResult">
      <div class="dim">Selecciona un item para calcular</div>
    </div>
  </div>`;
  updateItemList();
}

function updateItemList(){
  const cat=document.getElementById('cCat').value;
  const all=getAllItems().filter(i=>i.sell&&i.sell[0]);
  const filtered=cat==='all'?all:all.filter(i=>i.cat===cat);
  const sel=document.getElementById('cItem');
  sel.innerHTML=filtered.map((it,idx)=>`<option value="${it.cat}_${it.id}">${it.emoji} ${it.name} (${it.catName})</option>`).join('');
  // adjust star options based on first item
  calcUpdate();
}

function calcUpdate(){
  const key=document.getElementById('cItem').value;
  if(!key) return;
  const [cat,idStr]=key.split('_');
  const id=parseInt(idStr);
  const all=getAllItems();
  const item=all.find(i=>i.cat===cat&&i.id===id);
  if(!item) return;

  const starIdx=parseInt(document.getElementById('cStar').value);
  const maxStar=item.sell.length-1;
  const si=Math.min(starIdx,maxStar);
  const price=item.sell[si];
  if(!price){document.getElementById('calcResult').innerHTML='<div class="dim">Precio no disponible para esta calidad</div>';return;}

  const qty=Math.max(1,parseInt(document.getElementById('cQty').value)||1);
  const costExtra=parseInt(document.getElementById('cCostExtra').value)||0;
  const seedCost=item.cost||0;
  const totalSell=price*qty;
  const totalCost=(seedCost*qty)+costExtra;
  const totalProfit=totalSell-totalCost;
  const profitColor=totalProfit>0?'var(--green)':totalProfit<0?'#e85a5a':'var(--text-dim)';

  document.getElementById('calcResult').innerHTML=`
    <div class="dim">${item.emoji} ${item.name} · ${['1★','2★','3★','4★','5★'][si]} · ×${qty}</div>
    <div class="big" style="color:${profitColor}">${totalProfit>=0?'+':''}${totalProfit.toLocaleString('es')}g</div>
    <div class="sub-val">Beneficio ${totalProfit>=0?'neto':'(pérdida)'}</div>
    <div class="calc-breakdown">
      <div class="calc-box"><div class="lbl">💰 Venta total</div><div class="val" style="color:var(--gold-light)">${totalSell.toLocaleString('es')}g</div></div>
      <div class="calc-box"><div class="lbl">📦 Coste total</div><div class="val" style="color:#e8a946">${totalCost.toLocaleString('es')}g</div></div>
      <div class="calc-box"><div class="lbl">💵 Precio unitario</div><div class="val" style="color:var(--text)">${price}g</div></div>
      <div class="calc-box"><div class="lbl">📊 Margen</div><div class="val" style="color:${profitColor}">${totalCost>0?Math.round((totalProfit/totalCost)*100)+'%':'∞'}</div></div>
    </div>
  `;
}
