  body::before{content:'';position:fixed;top:0;left:0;right:0;bottom:0;background:radial-gradient(ellipse at 25% 15%,var(--body-glow1) 0%,transparent 50%),radial-gradient(ellipse at 75% 80%,var(--body-glow2) 0%,transparent 50%);pointer-events:none;z-index:0;}
  .container{position:relative;z-index:1;max-width:1020px;margin:0 auto;padding:24px 16px 80px;}
  .header{text-align:center;margin-bottom:28px;padding:16px 16px 8px;border-radius:var(--radius);backdrop-filter:blur(12px);background:rgba(13,13,30,0.6);}
  [data-theme="light"] .header{background:rgba(255,255,255,0.6);}
  .header .logo{width:140px;height:auto;border-radius:20px;margin-bottom:14px;box-shadow:0 6px 35px var(--logo-shadow),0 0 80px rgba(107,63,160,0.1);transition:all 0.4s;}
  .header .logo:hover{transform:scale(1.05);box-shadow:0 8px 45px var(--logo-shadow);}
  .header .tag{font-size:10px;letter-spacing:6px;color:var(--text-dim);text-transform:uppercase;margin-bottom:10px;font-weight:600;}
  .header h1{font-family:'Playfair Display',serif;font-size:42px;font-weight:800;background:var(--h1-grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:4px;letter-spacing:-0.5px;}
  .header .sub{font-family:'Playfair Display',serif;font-size:18px;background:var(--sub-grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px;font-weight:700;letter-spacing:1px;}
  .header p{color:var(--text-dim);font-size:13px;max-width:520px;margin:0 auto;line-height:1.6;}
  .tabs{display:flex;justify-content:center;gap:5px;margin-bottom:20px;flex-wrap:wrap;padding:6px;background:var(--tip-bg);border-radius:16px;max-width:fit-content;margin-left:auto;margin-right:auto;backdrop-filter:blur(12px);}
  [data-theme="light"] .tabs{background:rgba(255,255,255,0.7);}
  .tab-btn{padding:8px 16px;border-radius:11px;font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;transition:all 0.25s;border:1px solid transparent;background:transparent;color:var(--text-dim);}
  .tab-btn:hover{background:rgba(139,92,246,0.1);color:var(--text);}
  .tab-btn.active-garden{background:rgba(120,160,60,0.18);border-color:rgba(120,160,60,0.4);color:var(--green);}
  .tab-btn.active-fish{background:rgba(100,160,210,0.18);border-color:rgba(100,160,210,0.4);color:var(--blue);}
  .tab-btn.active-cook{background:rgba(210,160,90,0.18);border-color:rgba(210,160,90,0.4);color:var(--orange);}
  .tab-btn.active-bug{background:rgba(180,120,200,0.18);border-color:rgba(180,120,200,0.4);color:#c8a0e0;}
  .tab-btn.active-bird{background:rgba(100,180,160,0.18);border-color:rgba(100,180,160,0.4);color:#80d4b8;}
  .tab-btn.active-flower{background:rgba(220,120,160,0.18);border-color:rgba(220,120,160,0.4);color:#f0a0c0;}
  .tab-btn.active-map{background:rgba(80,140,220,0.18);border-color:rgba(80,140,220,0.4);color:#70b8f0;}
  .tab-btn.active-calc{background:rgba(224,192,96,0.18);border-color:rgba(224,192,96,0.4);color:var(--gold-light);}
  .filters{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:20px;padding:8px 12px;border-radius:14px;backdrop-filter:blur(12px);background:rgba(13,13,30,0.5);}
  [data-theme="light"] .filters{background:rgba(255,255,255,0.55);}
  .filters input[type="text"]{background:var(--bg-input);border:1px solid var(--filter-border);border-radius:10px;padding:8px 14px;color:var(--text);font-family:inherit;font-size:13px;outline:none;width:160px;transition:all 0.3s;}
  .filters input[type="text"]:focus{border-color:var(--border-hover);box-shadow:0 0 12px var(--shadow-card);}
  .filters input::placeholder{color:var(--text-muted);}
  .f-btn{background:var(--filter-bg);border:1px solid var(--filter-border);border-radius:10px;padding:7px 16px;color:var(--text-dim);font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;transition:all 0.2s;}
  .f-btn:hover{background:rgba(139,92,246,0.12);color:var(--text);}
  .f-btn.on{background:var(--filter-active-bg);border-color:var(--filter-active-border);color:var(--filter-active-color);font-weight:700;box-shadow:0 2px 8px var(--shadow-card);}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;}
  .card{background:linear-gradient(145deg,var(--bg-card) 0%,var(--bg-card2) 100%);border:1px solid var(--border);border-radius:16px;padding:0;transition:all 0.3s;overflow:hidden;}
  .card:hover{border-color:var(--border-hover);transform:translateY(-3px);box-shadow:0 12px 40px var(--shadow-card);}
  .card-top{display:flex;align-items:center;gap:12px;padding:16px 16px 12px;}
  .card-emoji{font-size:36px;width:56px;height:56px;display:flex;align-items:center;justify-content:center;border-radius:14px;flex-shrink:0;position:relative;transition:transform 0.3s;}
  .card:hover .card-emoji{transform:scale(1.1) rotate(-3deg);}
  .emoji-garden{background:linear-gradient(135deg,rgba(120,160,60,0.2),rgba(80,140,30,0.1));box-shadow:0 4px 15px rgba(120,160,60,0.15);}
  .emoji-fish{background:linear-gradient(135deg,rgba(100,160,210,0.2),rgba(60,130,200,0.1));box-shadow:0 4px 15px rgba(100,160,210,0.15);}
  .emoji-cook{background:linear-gradient(135deg,rgba(210,160,90,0.2),rgba(180,120,40,0.1));box-shadow:0 4px 15px rgba(210,160,90,0.15);}
  .emoji-bug{background:linear-gradient(135deg,rgba(180,120,200,0.2),rgba(140,80,180,0.1));box-shadow:0 4px 15px rgba(180,120,200,0.15);}
  .emoji-bird{background:linear-gradient(135deg,rgba(100,180,160,0.2),rgba(60,150,130,0.1));box-shadow:0 4px 15px rgba(100,180,160,0.15);}
  .emoji-flower{background:linear-gradient(135deg,rgba(220,120,160,0.2),rgba(200,80,130,0.1));box-shadow:0 4px 15px rgba(220,120,160,0.15);}
  .card-info{flex:1;min-width:0;}
  .card-name{font-size:15px;font-weight:700;margin-bottom:3px;display:flex;align-items:center;gap:4px;flex-wrap:wrap;text-shadow:0 1px 3px rgba(0,0,0,0.3);}
  [data-theme="light"] .card-name{text-shadow:none;}
  .card-tags{display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
  .tag-lvl{font-size:10px;padding:2px 8px;border-radius:6px;font-weight:700;letter-spacing:0.3px;}
  .tag-garden{background:var(--green-bg);color:var(--green);}
  .tag-fish{background:var(--blue-bg);color:var(--blue);}
  .tag-cook{background:var(--orange-bg);color:var(--orange);}
  .tag-bug{background:rgba(180,120,200,0.15);color:#c8a0e0;}
  .tag-bird{background:rgba(100,180,160,0.15);color:#80d4b8;}
  .tag-flower{background:rgba(220,120,160,0.15);color:#f0a0c0;}
  .tag-event{background:linear-gradient(90deg,rgba(255,180,50,0.25),rgba(255,140,30,0.15));color:#f0c040;font-size:9px;padding:2px 7px;border-radius:4px;font-weight:700;letter-spacing:0.5px;border:1px solid rgba(255,180,50,0.3);}
  .tag-sub{color:var(--text-dim);font-size:11px;}
  .card-price{text-align:right;padding:4px 10px;background:var(--tip-bg);border-radius:8px;}
  .card-price-label{font-size:9px;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.5px;}
  .card-price-val{font-size:16px;font-weight:800;color:var(--gold);}
  .card-body{padding:0 16px 14px;}
  .stars{display:grid;gap:5px;margin-bottom:10px;}
  .stars-4{grid-template-columns:repeat(4,1fr);}
  .stars-5{grid-template-columns:repeat(5,1fr);}
  .star-cell{text-align:center;padding:7px 3px;border-radius:8px;transition:transform 0.2s;}
  .star-cell:hover{transform:scale(1.05);}
  .star-cell .sl{font-size:9px;font-weight:700;margin-bottom:3px;letter-spacing:0.5px;}
  .star-cell .sv{font-size:14px;font-weight:800;color:var(--text);}
  .star-cell .sv.empty{color:var(--text-muted);font-weight:400;font-style:italic;}
  .profit{display:flex;justify-content:space-between;align-items:center;padding:6px 10px;background:var(--tip-bg);border-radius:8px;font-size:11px;margin-bottom:8px;}
  .profit .l{color:var(--text-dim);font-weight:500;}.profit .v{font-weight:800;font-size:13px;}
  .profit .high{color:var(--green);}.profit .mid{color:var(--gold);}.profit .neg{color:#c85a5a;}
  .card-divider{height:1px;background:var(--border);margin:0 0 10px;}
  .detail{font-size:11px;color:var(--text-dim);line-height:1.6;padding:0 2px;}
  .detail span{color:var(--text-detail);}
  .tip-box{margin-top:8px;background:var(--tip-bg);padding:8px 12px;border-radius:8px;color:var(--tip-color);font-style:italic;font-size:11px;border-left:3px solid var(--border-hover);line-height:1.5;}
  .footer{text-align:center;margin-top:28px;font-size:10px;color:var(--text-muted);}
  /* Calculator */
  .calc-panel{max-width:600px;margin:0 auto;}
  .calc-section{background:linear-gradient(135deg,var(--bg-card) 0%,var(--bg-card2) 100%);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:14px;}
  .calc-section h3{font-size:15px;font-weight:700;color:var(--gold-light);margin-bottom:14px;}
  .calc-row{display:flex;gap:10px;align-items:center;margin-bottom:10px;flex-wrap:wrap;}
  .calc-row label{font-size:12px;color:var(--text-dim);min-width:90px;}
  .calc-row select,.calc-row input[type="number"]{background:var(--bg-input);border:1px solid var(--border);border-radius:8px;padding:8px 10px;color:var(--text);font-family:inherit;font-size:13px;outline:none;flex:1;min-width:80px;transition:all 0.3s;}
  .calc-row select option{background:var(--bg-input);color:var(--text);}
  .calc-row select:focus,.calc-row input:focus{border-color:var(--border-hover);box-shadow:0 0 8px var(--shadow-card);}
  .calc-result{background:linear-gradient(135deg,var(--bg-card) 0%,var(--bg-card2) 100%);border:1px solid var(--border);border-radius:var(--radius);padding:20px;text-align:center;}
  .calc-result .big{font-size:36px;font-weight:800;color:var(--gold-light);margin:8px 0;}
  .calc-result .sub-val{font-size:14px;color:var(--green);margin:4px 0;}
  .calc-result .dim{font-size:12px;color:var(--text-dim);}
  .calc-breakdown{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px;}
  .calc-box{background:var(--tip-bg);border-radius:10px;padding:12px;text-align:center;}
  .calc-box .val{font-size:20px;font-weight:700;margin:4px 0;}
  .calc-box .lbl{font-size:11px;color:var(--text-dim);}
  /* Map */
  .map-panel{max-width:900px;margin:0 auto;}
  .map-frame{width:100%;height:70vh;min-height:450px;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:14px;position:relative;}
  .map-frame iframe{width:100%;height:100%;border:none;}
  .map-fullscreen{position:absolute;top:10px;right:10px;background:var(--bg-input);border:1px solid var(--border);border-radius:8px;padding:6px 12px;color:var(--text);font-family:inherit;font-size:12px;cursor:pointer;z-index:10;transition:all 0.2s;}
  .map-fullscreen:hover{border-color:var(--border-hover);background:var(--tip-bg);}
  .map-links{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px;margin-bottom:14px;}
  .map-link{background:linear-gradient(135deg,var(--bg-card) 0%,var(--bg-card2) 100%);border:1px solid var(--border);border-radius:var(--radius);padding:14px;text-decoration:none;color:var(--text);transition:all 0.25s;display:block;}
  .map-link:hover{border-color:var(--border-hover);transform:translateY(-2px);box-shadow:0 6px 20px var(--shadow-card);}
  .map-link .ml-title{font-size:14px;font-weight:700;margin-bottom:4px;}
  .map-link .ml-desc{font-size:11px;color:var(--text-dim);line-height:1.4;}
  .map-zones{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px;}
  .zone-card{background:linear-gradient(135deg,var(--bg-card) 0%,var(--bg-card2) 100%);border:1px solid var(--border);border-radius:var(--radius);padding:14px;}
  .zone-card h4{font-size:14px;font-weight:700;margin-bottom:8px;}
  .zone-card .zone-items{font-size:11px;color:var(--text-dim);line-height:1.7;}
  .zone-card .zone-items span{color:var(--text-detail);}
  @media(max-width:640px){.header h1{font-size:30px;}.grid{grid-template-columns:1fr;}.calc-breakdown{grid-template-columns:1fr;}.map-frame{height:60vh;min-height:350px;}}
</style>
</head>

function setLang(l){
  lang=l;
  localStorage.setItem('dn_lang',l);
  document.querySelectorAll('.lang-btn').forEach(b=>{b.classList.toggle('active',b.dataset.lang===l);});
  applyLang();
  if(tab==='calc') renderCalc();
  else if(tab==='map') renderMap();
  else render();
}
function applyLang(){
  const t=i18n[lang];
  const tagEl=document.querySelector('.header .tag');if(tagEl)tagEl.textContent=t.tag;
  const descEl=document.querySelector('.header p');if(descEl)descEl.textContent=t.desc;
  document.querySelectorAll('.tabs .tab-btn').forEach(b=>{
    const k=b.getAttribute('onclick')?.match(/setTab\('(\w+)'/)?.[1];
    if(k&&t.tabs[k]) b.textContent=t.tabs[k];
  });
  const searchEl=document.getElementById('searchBox');if(searchEl)searchEl.placeholder=t.filters.search;
  const filterMap={all:t.filters.all,low:t.filters.low,mid:t.filters.mid,high:t.filters.high};
  document.querySelectorAll('.f-btn').forEach(b=>{const f=b.dataset.f;if(filterMap[f])b.textContent=filterMap[f];});
  const footEl=document.querySelector('.footer');if(footEl)footEl.textContent=t.footer;
}

let tab='garden',filter='all';
function getAllItems(){
  const all=[];
  DEF_GARDEN.forEach(i=>all.push({...i,cat:'garden',catName:'🌾 Cultivo'}));
  DEF_FISH.forEach(i=>all.push({...i,cat:'fish',catName:'🐟 Pez'}));
  DEF_COOK.forEach(i=>all.push({...i,cat:'cook',catName:'🍳 Receta'}));
  DEF_BUG.forEach(i=>all.push({...i,cat:'bug',catName:'🦋 Bicho'}));
  DEF_BIRD.forEach(i=>all.push({...i,cat:'bird',catName:'🐦 Ave'}));
  DEF_FLOWER.forEach(i=>all.push({...i,cat:'flower',catName:'🌸 Flor'}));
  return all;
}
function getData(){
  if(tab==='garden') return DEF_GARDEN;
  if(tab==='fish') return DEF_FISH;
  if(tab==='bug') return DEF_BUG;
  if(tab==='bird') return DEF_BIRD;
  if(tab==='flower') return DEF_FLOWER;
  return DEF_COOK;
}
function setTab(t,el){
  tab=t;
  document.querySelectorAll('.tab-btn').forEach(b=>b.className='tab-btn');
  const cls=t==='garden'?'active-garden':t==='fish'?'active-fish':t==='bug'?'active-bug':t==='bird'?'active-bird':t==='flower'?'active-flower':t==='calc'?'active-calc':t==='map'?'active-map':'active-cook';
  el.classList.add('tab-btn',cls);
  document.getElementById('filtersBar').style.display=(t==='calc'||t==='map')?'none':'flex';
  document.getElementById('grid').style.display=(t==='calc'||t==='map')?'none':'grid';
  document.getElementById('calcView').style.display=t==='calc'?'block':'none';
  document.getElementById('mapView').style.display=t==='map'?'block':'none';
  if(t==='calc') renderCalc(); else if(t==='map') renderMap(); else render();
}
function setFilter(el){
  document.querySelectorAll('.f-btn').forEach(b=>b.classList.remove('on'));
  el.classList.add('on');filter=el.dataset.f;render();
}
function getStarCount(){return tab==='garden'?4:5;}

function render(){
  const data=getData(),search=document.getElementById('searchBox').value.toLowerCase();
  const list=data.filter(c=>c.name.toLowerCase().includes(search)).filter(c=>{
    if(filter==='low')return c.level<=3;if(filter==='mid')return c.level>=4&&c.level<=7;if(filter==='high')return c.level>=8;return true;
  }).sort((a,b)=>a.level-b.level);
  const grid=document.getElementById('grid');grid.innerHTML='';
  const stars=getStarCount(),labels=stars===4?SL4:SL5;
  const tagClass=tab==='garden'?'tag-garden':tab==='fish'?'tag-fish':tab==='bug'?'tag-bug':tab==='bird'?'tag-bird':tab==='flower'?'tag-flower':'tag-cook';
  const emojiClass=tab==='garden'?'emoji-garden':tab==='fish'?'emoji-fish':tab==='bug'?'emoji-bug':tab==='bird'?'emoji-bird':tab==='flower'?'emoji-flower':'emoji-cook';
  list.forEach(item=>{
    const card=document.createElement('div');card.className='card';
    let pH='';
    for(let i=0;i<stars;i++){const v=item.sell[i],sI=Math.min(i,SC.length-1),bg=v?'12':'05',bd=v?'25':'08';
      pH+=`<div class="star-cell" style="background:${SC[sI].replace(')','')+ bg});border:1px solid ${SC[sI].replace(')','')+ bd})"><div class="sl" style="color:${SC[sI]}">${labels[i]}</div><div class="sv ${v?'':'empty'}">${v?v+'g':'—'}</div></div>`;}
    const profit=item.sell[0]&&item.cost!==undefined?item.sell[0]-item.cost:null;
    const pC=profit>100?'high':profit>0?'mid':profit!==null?'neg':'';
    const costHTML=(tab==='fish'||tab==='bug'||tab==='bird'||tab==='flower')?'':`<div class="card-price"><div class="card-price-label">${tab==='garden'?i18n[lang].card.seed:i18n[lang].card.cost}</div><div class="card-price-val">${item.cost}g</div></div>`;
    const timeStr=item.time?`<span class="tag-sub">⏱ ${item.time}</span>`:'';
    const eventTag=(item.detail&&item.detail.includes('Evento'))?`<span class="tag-event">${i18n[lang].card.event}</span>`:'';
    const secretTag=(item.detail&&item.detail.includes('🔓'))?`<span class="tag-event" style="background:linear-gradient(90deg,rgba(139,92,246,0.25),rgba(139,92,246,0.1));color:#c8b8f0;border-color:rgba(139,92,246,0.3);">${i18n[lang].card.secret}</span>`:'';
    card.innerHTML=`
      <div class="card-top">
        <div class="card-emoji ${emojiClass}">${item.emoji}</div>
        <div class="card-info">
          <div class="card-name">${tName(item.name)}${eventTag}${secretTag}</div>
          <div class="card-tags"><span class="tag-lvl ${tagClass}">Nv.${item.level}</span>${timeStr}</div>
        </div>
        ${costHTML}
      </div>
      <div class="card-body">
        <div class="stars stars-${stars}">${pH}</div>
        ${profit!==null?`<div class="profit"><span class="l">${i18n[lang].card.profit}</span><span class="v ${pC}">${profit>=0?'+':''}${profit}g</span></div>`:''}
        <div class="card-divider"></div>
        <div class="detail">📋 <span>${item.detail}</span></div>
        ${item.shadow?`<div class="detail" style="margin-top:4px;">👤 <span>${lang==='es'?'Sombra':lang==='en'?'Shadow':'Ombre'}: <strong style="color:${item.shadow==='S'?'#7dd3fc':item.shadow==='M'?'#fbbf24':item.shadow==='L'?'#f97316':item.shadow==='G'?'#e0c060':'#c084fc'}">${item.shadow==='S'?(lang==='es'?'Pequeña':lang==='en'?'Small':'Petite'):item.shadow==='M'?(lang==='es'?'Mediana':lang==='en'?'Medium':'Moyenne'):item.shadow==='L'?(lang==='es'?'Grande':lang==='en'?'Large':'Grande'):item.shadow==='G'?(lang==='es'?'Dorada':lang==='en'?'Golden':'Dorée'):(lang==='es'?'Azul (Atractor)':lang==='en'?'Blue (Attractor)':'Bleu (Attracteur)')}</strong></span></div>`:''}
        ${item.tip?`<div class="tip-box">💡 ${item.tip}</div>`:''}
      </div>`;
    grid.appendChild(card);
  });
}

function renderCalc(){
  const all=getAllItems().filter(i=>i.sell&&i.sell[0]);
  const cv=document.getElementById('calcView');
  cv.innerHTML=`<div class="calc-panel">
    <div class="calc-section">
      <h3>🧮 Calculadora de Beneficios</h3>
      <div class="calc-row"><label>Categoría</label><select id="cCat" onchange="updateItemList()"><option value="all">Todas</option><option value="garden">🌾 Cultivos</option><option value="fish">🐟 Peces</option><option value="cook">🍳 Recetas</option><option value="bug">🦋 Bichos</option><option value="bird">🐦 Aves</option><option value="flower">🌸 Flores</option></select></div>
      <div class="calc-row"><label>Item</label><select id="cItem" onchange="calcUpdate()"></select></div>
      <div class="calc-row"><label>Calidad ★</label><select id="cStar" onchange="calcUpdate()"><option value="0">1★</option><option value="1">2★</option><option value="2">3★</option><option value="3">4★</option><option value="4">5★</option></select></div>
      <div class="calc-row"><label>Cantidad</label><input id="cQty" type="number" min="1" value="1" onchange="calcUpdate()" oninput="calcUpdate()"></div>
      <div class="calc-row"><label>Coste extra</label><input id="cCostExtra" type="number" min="0" value="0" placeholder="Ingredientes comprados..." onchange="calcUpdate()" oninput="calcUpdate()"></div>
    </div>
    <div class="calc-result" id="calcResult">
      <div class="dim">Selecciona un item para calcular</div>
    </div>
  </div>`;
  updateItemList();
}

function updateItemList(){
  const cat=document.getElementById('cCat').value;
  const all=getAllItems().filter(i=>i.sell&&i.sell[0]);
  const filtered=cat==='all'?all:all.filter(i=>i.cat===cat);
  const sel=document.getElementById('cItem');
  sel.innerHTML=filtered.map((it,idx)=>`<option value="${it.cat}_${it.id}">${it.emoji} ${tName(it.name)} (${it.catName})</option>`).join('');
  // adjust star options based on first item
  calcUpdate();
}

function calcUpdate(){
  const key=document.getElementById('cItem').value;
  if(!key) return;
  const [cat,idStr]=key.split('_');
  const id=parseInt(idStr);
  const all=getAllItems();
  const item=all.find(i=>i.cat===cat&&i.id===id);
  if(!item) return;

  const starIdx=parseInt(document.getElementById('cStar').value);
  const maxStar=item.sell.length-1;
  const si=Math.min(starIdx,maxStar);
  const price=item.sell[si];
  if(!price){document.getElementById('calcResult').innerHTML='<div class="dim">Precio no disponible para esta calidad</div>';return;}

  const qty=Math.max(1,parseInt(document.getElementById('cQty').value)||1);
  const costExtra=parseInt(document.getElementById('cCostExtra').value)||0;
  const seedCost=item.cost||0;
  const totalSell=price*qty;
  const totalCost=(seedCost*qty)+costExtra;
  const totalProfit=totalSell-totalCost;
  const profitColor=totalProfit>0?'var(--green)':totalProfit<0?'#e85a5a':'var(--text-dim)';

  document.getElementById('calcResult').innerHTML=`
    <div class="dim">${item.emoji} ${tName(item.name)} · ${['1★','2★','3★','4★','5★'][si]} · ×${qty}</div>
    <div class="big" style="color:${profitColor}">${totalProfit>=0?'+':''}${totalProfit.toLocaleString('es')}g</div>
    <div class="sub-val">Beneficio ${totalProfit>=0?'neto':'(pérdida)'}</div>
    <div class="calc-breakdown">
      <div class="calc-box"><div class="lbl">💰 Venta total</div><div class="val" style="color:var(--gold-light)">${totalSell.toLocaleString('es')}g</div></div>
      <div class="calc-box"><div class="lbl">📦 Coste total</div><div class="val" style="color:#e8a946">${totalCost.toLocaleString('es')}g</div></div>
      <div class="calc-box"><div class="lbl">💵 Precio unitario</div><div class="val" style="color:var(--text)">${price}g</div></div>
      <div class="calc-box"><div class="lbl">📊 Margen</div><div class="val" style="color:${profitColor}">${totalCost>0?Math.round((totalProfit/totalCost)*100)+'%':'∞'}</div></div>
    </div>
  `;
}
